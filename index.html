<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 EduPlan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <meta name="theme-color" content="#2196F3">
    <style>
        /* ==============================================
           GLOBAL RESETS & BASE STYLES
           ============================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
            --danger: #ff4444;
            --danger-dark: #cc0000;
            --background: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-muted: #6c757d;
            --border: #e9ecef;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
            padding: 1rem;
        }


        /* ==============================================
           MAIN LAYOUT (MOBILE-FIRST)
           ============================================== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
        }

        @media (max-width: 360px) {
            .container {
                padding: 1rem;
            }
        }


        /* ==============================================
           HEADER STYLES
           ============================================== */
        .app-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .app-header h1 {
            color: var(--primary);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        @media (min-width: 480px) {
            .app-header h1 {
                font-size: 2.2rem;
            }
        }


        /* ==============================================
           ADD TASK FORM
           ============================================== */
        .add-task-form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .task-input {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .add-btn {
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .add-btn:hover {
            background-color: var(--primary-dark);
        }

        @media (min-width: 480px) {
            .add-task-form {
                flex-direction: row;
            }
            .task-input {
                flex: 1;
            }
            .add-btn {
                flex-shrink: 0;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }


        /* ==============================================
           TASK LIST STYLES
           ============================================== */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 0.2rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .task-item:hover {
            background-color: rgba(33, 150, 243, 0.03);
        }

        .task-text {
            cursor: pointer;
            font-size: 1rem;
            word-wrap: break-word;
            max-width: calc(100% - 40px);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            transition: background-color 0.2s ease;
        }

        .delete-btn:hover {
            background-color: var(--danger-dark);
        }


        /* ==============================================
           EMPTY STATE STYLES
           ============================================== */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 1rem;
            border: 2px dashed var(--border);
            border-radius: 8px;
        }

        .empty-state p {
            font-size: 1rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>📚 EduPlan</h1>
        </header>
        
        <!-- Add Task Form -->
        <div class="add-task-form">
            <input type="text" id="todo-input" class="task-input" placeholder="Add a new study task...">
            <button id="add-btn" class="add-btn">Add</button>
        </div>

        <!-- Task List -->
        <ul id="todo-list" class="task-list"></ul>
    </div>

    <script>
        // Local Storage Key
        const TODO_KEY = 'eduPlan';

        // DOM Elements
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        // Initialize App
        loadTodos();

        // Add Task
        addBtn.addEventListener('click', () => {
            const text = todoInput.value.trim();
            if (!text) return;
            
            const todos = getTodos();
            todos.push({ id: Date.now(), text, completed: false });
            saveTodos(todos);
            loadTodos();
            todoInput.value = '';
        });

        // Allow Enter Key to Add
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addBtn.click();
        });

        // Delete/Complete Task
        todoList.addEventListener('click', (e) => {
            const id = parseInt(e.target.dataset.id);
            if (!id) return;

            const todos = getTodos();
            if (e.target.classList.contains('delete-btn')) {
                // Delete
                const updated = todos.filter(todo => todo.id !== id);
                saveTodos(updated);
            } else if (e.target.classList.contains('task-text')) {
                // Toggle Complete
                const updated = todos.map(todo => 
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                );
                saveTodos(updated);
            }
            loadTodos();
        });

        // Helper Functions
        function getTodos() {
            return JSON.parse(localStorage.getItem(TODO_KEY)) || [];
        }

        function saveTodos(todos) {
            localStorage.setItem(TODO_KEY, JSON.stringify(todos));
        }

        function loadTodos() {
            const todos = getTodos();
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <li class="empty-state">
                        <span>📖 No study tasks yet!</span>
                        <p>Add a task to start planning your studies</p>
                    </li>
                `;
                return;
            }

            todoList.innerHTML = todos.map(todo => `
                <li class="task-item ${todo.completed ? 'completed' : ''}">
                    <span class="task-text" data-id="${todo.id}">${todo.text}</span>
                    <button class="delete-btn" data-id="${todo.id}">×</button>
                </li>
            `).join('');
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.error('Service Worker error:', err));
            });
        }
    </script>
</body>
</html>
