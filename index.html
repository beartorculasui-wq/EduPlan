<!DOCTYPE html>
<html>
<head>

<title>EduPlanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#2268be;
display:flex;
justify-content:center;
margin-top:30px;
}

.container{
width:340px;
background:rgb(38, 186, 216);
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:12px;
color:rgb(12, 2, 2);
margin-bottom:10px;
}

.menu{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.menu button{
flex:1;
margin:3px;
padding:10px;
border:none;
background:#4a90e2;
color:rgb(16, 2, 123);
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.screen{
display:none;
}

.active{
display:block;
}

.task{
background:#0644a1;
margin:5px;
padding:8px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

input{
width:90%;
padding:7px;
margin-top:8px;
}

.addBtn{
margin-top:8px;
padding:8px;
background:#0eafaf;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.dark{
background:#1e1e1e;
color:white;
}

.dark .container{
background:#2c2c2c;
}

.dark .task{
background:#3a3a3a;
}

</style>

</head>

<body>

<div class="container">

<h2>📚 EduPlanner</h2>
<p class="subtitle">Student Daily Planner</p>

<div class="menu">
<button onclick="showScreen('schedule')">📅sched</button>
<button onclick="showScreen('tasks')">✅tasks</button>
<button onclick="showScreen('notes')">📝notes</button>
<button onclick="showScreen('settings')">⚙️settings</button>
</div>


<div id="schedule" class="screen active">
<h3>Today's Schedule</h3>
<div id="scheduleList"></div>
<input id="scheduleInput" placeholder="Add schedule">
<br>
<button class="addBtn" onclick="addSchedule()">Add Schedule</button>
</div>


<div id="tasks" class="screen">
<h3>Tasks</h3>
<div id="taskList"></div>
<input id="taskInput" placeholder="Enter task">
<br>
<button class="addBtn" onclick="addTask()">Add Task</button>
</div>

<div id="notes" class="screen">
<h3>Notes</h3>
<p></p>
<p>Study Tip: Review your notes every night.</p>
<p>Appdev: Study javascript.</p>

</div>

<div id="settings" class="screen">
<h3>Settings</h3>
<button class="addBtn" onclick="toggleDark()">🌙 Dark Mode</button>
<br><br>

</div>

</div>

<script>


function showScreen(screen){
let screens=document.querySelectorAll(".screen");
screens.forEach(function(s){ s.classList.remove("active"); });
document.getElementById(screen).classList.add("active");
}

let tasks=[];
function addTask(){
let input=document.getElementById("taskInput");
let task=input.value;
if(task==="") return;
tasks.push(task);
localStorage.setItem("tasks",JSON.stringify(tasks));
input.value="";
displayTasks();
}
function deleteTask(index){
tasks.splice(index,1);
localStorage.setItem("tasks",JSON.stringify(tasks));
displayTasks();
}
function displayTasks(){
let list=document.getElementById("taskList");
list.innerHTML="";
tasks.forEach(function(task,index){
let div=document.createElement("div");
div.className="task";
div.innerHTML=task+" <button onclick='deleteTask("+index+")'>X</button>";
list.appendChild(div);
});
}
function loadTasks(){
let saved=localStorage.getItem("tasks");
if(saved){ tasks=JSON.parse(saved); }
displayTasks();
}
function clearTasks(){
if(confirm("Delete all tasks?")){
tasks=[];
localStorage.removeItem("tasks");
displayTasks();
}
}

let schedules=[];
function addSchedule(){
let input = document.getElementById("scheduleInput");
let text = input.value;
if(text==="") return;
schedules.unshift(text);
localStorage.setItem("schedules", JSON.stringify(schedules));
input.value="";
displaySchedules();
}
function deleteSchedule(i){
schedules.splice(i,1);
localStorage.setItem("schedules", JSON.stringify(schedules));
displaySchedules();
}
function displaySchedules(){
let list = document.getElementById("scheduleList");
list.innerHTML="";
schedules.forEach(function(item,index){
let div = document.createElement("div");
div.className="task";
div.innerHTML = item + " <button onclick='deleteSchedule("+index+")'>X</button>";
list.appendChild(div);
});
}
function loadSchedules(){
let data = localStorage.getItem("schedules");
if(data){ schedules = JSON.parse(data); }
displaySchedules();
}

// -----------------
// Dark Mode
// -----------------
function toggleDark(){
document.body.classList.toggle("dark");
}

// -----------------
// Init
// -----------------
loadSchedules();
loadTasks();

</script>

<script>
// Service Worker for PWA
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
.then(function(){ console.log("Service Worker Registered"); });
}
</script>

</body>
</html>
